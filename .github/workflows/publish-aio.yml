# Builds the ALL-IN-ONE Escalio image and publishes it to the GitHub Container
# Registry (GHCR), for both regular machines (amd64) and ARM devices (arm64).
#
# After the first successful run the image is at:
#   ghcr.io/<owner>/<repo>:latest   (also :<git-sha> and any :vX.Y.Z tag)
#
# Then ANYONE can run the whole app with one command:
#   docker run --rm -p 8501:8501 -p 8000:8000 ghcr.io/<owner>/<repo>:latest
#
# One-time: after the first run, make the GHCR package public
# (repo -> Packages -> the package -> Package settings -> Visibility -> Public)
# so people can pull without logging in.

name: Publish all-in-one image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (all-in-one)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aio        # the bundled Postgres + API + UI image
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
